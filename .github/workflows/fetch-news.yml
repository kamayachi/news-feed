name: Fetch news feeds

on:
  schedule:
    # UTC 20:30 (日〜木) = 日本時間 平日 5:30
    - cron: '30 20 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news/
          git commit -m "Update news $(date -u +%Y-%m-%d)" || echo "no changes"
          git push
